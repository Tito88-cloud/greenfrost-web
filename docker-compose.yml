version: '3.8'

services:
  greenfrost-web:
    build: .
    container_name: greenfrost-web
    restart: unless-stopped
    ports:
      - "3080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.managed=true"
